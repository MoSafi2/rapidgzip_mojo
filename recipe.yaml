context:
  name: rapidgzip-mojo
  version: "0.1.1"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - path: .
  - url: https://github.com/mxmlnkn/rapidgzip/archive/refs/tags/rapidgzip-v0.16.0.tar.gz
    sha256: 1ac77e808b79ffbb3dbbbdded795d6a8c160d6d0ca295cd6d658f09af468160d
    target_directory: rapidgzip
  # librapidarchive submodule (C++ headers live here; GitHub tarballs omit submodules)
  - url: https://github.com/mxmlnkn/indexed_bzip2/archive/1221a30bb548b305a69e5715f2bc348ba37ac243.tar.gz
    sha256: 1d5cb064430568b0e13c829d907f40e96581f17ba931271e3c7e78a9bdd9118b
    target_directory: rapidgzip/librapidarchive

build:
  number: 0
  script:
    - bash ${RECIPE_DIR}/build_conda.sh

requirements:
  build:
    - ${{ compiler("c") }}
    - ${{ compiler("cxx") }}
    - zlib
    - mojo =0.26.2

  host:
    - zlib

  run:
    - mojo =0.26.2
    - zlib

tests:
  - script:
      - mojo run -I $PREFIX/lib/mojo -L $PREFIX/lib $PREFIX/lib/mojo/test_rapidgzip.mojo

about:
  homepage: https://github.com/mxmlnkn/rapidgzip
  license: MIT
  summary: Mojo FFI bindings for rapidgzip parallel gzip decompression
  description: |
    Mojo bindings for the rapidgzip C++ library via a thin C shim.
    Provides RapidgzipFile, decompress_buffer, decompress_alloc, and index API.