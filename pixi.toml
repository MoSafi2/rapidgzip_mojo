[workspace]
name = "rapidgzip-mojo"
version = "0.1.1"
preview = ["pixi-build"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[package]
name = "rapidgzip-mojo"
version = "0.1.1"

# Binary deps (mojo, zlib) come from recipe.yaml - pixi-build-rattler-build
# does not allow binary deps in manifest. For local dev: pixi add mojo

[package.build]
backend = { name = "pixi-build-rattler-build", version = "*", channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://conda.modular.com/max-nightly",
    "conda-forge",
] }

[tasks]
build = "pixi build"
test = "LD_LIBRARY_PATH=. mojo run -I . tests/test_main.mojo"

[dependencies]
mojo = "0.26.2.*"
