name: Build rapidgzip-mojo

on:
  push:
    branches: [main, master]
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-64
            runs-on: ubuntu-latest
          - platform: osx-arm64
            runs-on: macos-14

    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4

      - name: Build conda package (${{ matrix.platform }})
        run: pixi build

      - uses: actions/upload-artifact@v4
        with:
          name: rapidgzip-mojo-conda-${{ matrix.platform }}
          path: "*.conda"

  upload-release:
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - name: Download all conda artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: rapidgzip-mojo-conda-*
          path: ./conda-packages
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./conda-packages/*.conda
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}